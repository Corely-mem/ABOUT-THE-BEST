<!DOCTYPE html>

<html>
    <head>
        <title>Learning</title>
        <link rel="icon" type="image/png" href="NVIDIA-GeForce-RTX-5090.png">
    </head>
    <body>
        
        <form action="index.php" method="POST" enctype="multipart/form-data">

            <label for="username">username</label>
            <input type="text" id="username" placeholder="iron man" minlength="6" maxlength="40" required><br>

            <label for="password">password</label>
            <input type="password" id="password" minlength="6" maxlength="40" required><br>

            <label for="email">email</label>
            <input type="email" id="email" required><br>

            <label for="phone">phone</label>
            <input type="tel" id="phone" required><br>

            <label for="bday">birthdate</label>
            <input type="date" id="bday" required><br>

            <label for="quantity">quantity</label>
            <input type="number" id="quantity" required min="0" max="99"><br>

            <label for="title">title</label>
            
            <label for="Mr.">Mr.</label>
            <input type="radio" id="Mr." value="Mr." name="title">
            <label for="Ms.">Ms.</label>
            <input type="radio" id="Ms." value="Ms." name="title">
            <label for="PHD">PHD</label>
            <input type="radio" id="PHD" value="PHD" name="title"><br>

            <label for="payment">payment</label>
            <select>
                <option value="visa">visa</option>
                <option value="mastercard">mastercard</option>
                <option value="giftcard">giftcard</option>
            </select><br>

            <label for="subscribe">subscribe</label>
            <input type="checkbox" id="subscribe"><br>

            <label type="comment">comment</label>
            <textarea id="comment" rows="3" cols="25"></textarea>

            <label for="file">file</label>
            <input type="file" id="file" accept="image/png, image/jpeg">

            <br>
            <input type="submit">
            <br>
            <input type="reset">

        </form>

    </body>


    <!-- THIS IS A COMMENT-->
</html>
